<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Login Page</title>
    </head>
    <body>
        <h1>Login here</h1>
        <hr>
        <span th:text="${signupSuccess}" style="color:green"></span>

            <input type="submit" value="Login">
        </form>
    </body>
</html>
